  england-triggerer:
    build:
      context: ./Airflow/England
      dockerfile: Dockerfile
    image: smartmove-england-airflow:latest
    command: triggerer
    env_file: .env
    environment:
      <<: *airflow-common-env
      AIRFLOW__CELERY__BROKER_URL: "redis://:@redis-england:6379/0"
      AIRFLOW__CORE__DAGS_FOLDER: "/opt/airflow/England/dags"
      PYTHONPATH: "/opt/airflow/England:/opt/airflow/utils"
    volumes:
      - ./Airflow/England:/opt/airflow/England

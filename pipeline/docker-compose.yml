  # ── 5. Machine Learning Build Targets ──────────────────────────────
  # These do not run as permanent services. They are here so you can 
  # compile all three models at once by running `docker compose build`.
  ml-build-dubai:
    build:
      context: ./ml/Dubai
    image: ghcr.io/smartmove/ml-forecaster-dubai:latest
    profiles: ["ml-build-only"]

  ml-build-england:
    build:
      context: ./ml/England
    image: ghcr.io/smartmove/ml-forecaster-england:latest
    profiles: ["ml-build-only"]

  ml-build-egypt:
    build:
      context: ./ml/Egypt
    image: ghcr.io/smartmove/ml-forecaster-egypt:latest
    profiles: ["ml-build-only"]

volumes:
  postgres-db-master:
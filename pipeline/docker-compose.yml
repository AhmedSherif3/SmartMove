      postgres-shared:
        condition: service_healthy
      redis-england:
        condition: service_healthy

  england-webserver:
    command: webserver
    build:
      context: ./Airflow/England
      dockerfile: Dockerfile
    image: smartmove-england-airflow:latest
    env_file: .env
    environment:
      <<: *airflow-common-env
      AIRFLOW__CELERY__BROKER_URL: "redis://:@redis-england:6379/0"
      AIRFLOW__CORE__DAGS_FOLDER: "/opt/airflow/England/dags"
      PYTHONPATH: "/opt/airflow/England:/opt/airflow/utils"
    ports:
      - "8081:8080"
    volumes:
      - ./Airflow/England:/opt/airflow/England
      - ./Airflow/utils:/opt/airflow/utils
    depends_on:
      postgres-shared:
        condition: service_healthy

  england-worker:
    build:
      context: ./Airflow/England
      dockerfile: Dockerfile
    image: smartmove-england-airflow:latest
    command: celery worker
    env_file: .env
    environment:
      <<: *airflow-common-env
      AIRFLOW__CELERY__BROKER_URL: "redis://:@redis-england:6379/0"
      AIRFLOW__CORE__DAGS_FOLDER: "/opt/airflow/England/dags"
      PYTHONPATH: "/opt/airflow/England:/opt/airflow/utils"
      DUMB_INIT_SETSID: "0"
    volumes:
      - ./Airflow/England:/opt/airflow/England

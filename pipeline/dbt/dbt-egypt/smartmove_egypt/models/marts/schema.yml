version: 2

models:
  - name: stg_egy
    description: "Staging layer for Egypt property listings (typed + cleaned)."
    columns:
      - name: listing_id
        tests:
          - not_null
          - unique

      - name: listing_year
        description: "Year from the source column [date]"
        tests:
          - not_null

      - name: city
        tests:
          - not_null

      - name: governorate
        tests:
          - not_null
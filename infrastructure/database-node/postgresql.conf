# ==============================================================================
# SmartMove — Enterprise PostgreSQL 16 Configuration (Server 2)
# Tuned for: 4 OCPUs, 24GB RAM
# ==============================================================================

# ── Connections ─────────────────────────────────────────────
listen_addresses = '*'
max_connections = 300
superuser_reserved_connections = 5

# ── Memory Settings ─────────────────────────────────────────
# 25% of total RAM dedicated to PostgreSQL buffers
shared_buffers = 6GB                  
huge_pages = try
# Memory for complex sorts and aggregations per connection
work_mem = 64MB                       
# Memory for VACUUM and index creation
maintenance_work_mem = 1GB            
effective_cache_size = 18GB           

# ── Write-Ahead Log (WAL) & Reliability ─────────────────────
wal_level = replica
max_wal_size = 4GB
min_wal_size = 1GB
checkpoint_completion_target = 0.9
wal_buffers = 16MB

# ── Query Tuning ────────────────────────────────────────────
random_page_cost = 1.1                # Optimized for NVMe SSDs
effective_io_concurrency = 200        # Concurrent I/O operations for SSDs

# ── Logging ─────────────────────────────────────────────────
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%a.log'
log_truncate_on_rotation = on
log_rotation_age = 1d
log_rotation_size = 0
log_min_duration_statement = 1000     # Log queries taking longer than 1 second
log_checkpoints = on
log_lock_waits = on
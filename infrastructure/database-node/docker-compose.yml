# ==============================================================================
# SmartMove — Support & Data Layer (Server 2)
# ==============================================================================

services:
  # ────────────────────────────────────────────────────────────
  # 1. PostgreSQL 16 — Core Relational Database
  # ────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: smartmove_postgres
    restart: unless-stopped
    # Port 5432 is intentionally NOT mapped to the host.
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    networks:
      - db-net

  # ────────────────────────────────────────────────────────────
  # 2. PgBouncer — Database Connection Pooler (Traffic Cop)
  # ────────────────────────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: smartmove_pgbouncer
    restart: unless-stopped
    ports:
      - "6432:5432" 
    environment:
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_NAME: ${POSTGRES_DB}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 5000
      DEFAULT_POOL_SIZE: 100
      ADMIN_USERS: ${PGBOUNCER_ADMIN_USER}
      AUTH_TYPE: scram-sha-256
    depends_on:
      - postgres
    networks:
      - db-net

  # ────────────────────────────────────────────────────────────
  # 3. Redis — Application Cache & Celery Message Broker
  # ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: smartmove_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "4gb", "--maxmemory-policy", "allkeys-lru"]
    networks:
      - db-net

  # ────────────────────────────────────────────────────────────
  # 4. Exporters — Sends health data to Server 3 (Prometheus)
  # ────────────────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: postgres_exporter
    restart: unless-stopped
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      - postgres
    networks:
      - db-net

  redis-exporter:
    image: oliver006/redis_exporter
    container_name: redis_exporter
    restart: unless-stopped
    ports:
      - "9121:9121"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_ADDR: "redis://redis:6379"
    depends_on:
      - redis
    networks:
      - db-net

  # ────────────────────────────────────────────────────────────
  # 5. Backup Cron — Nightly automated external cloud backups
  # ────────────────────────────────────────────────────────────
  backup-cron:
    image: minio/mc:latest
    container_name: postgres_backup
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
    volumes:
      - ./backup.sh:/usr/local/bin/backup.sh:ro
      - backup_data:/backups
    entrypoint: /bin/sh -c "microdnf install -y postgresql && echo '0 2 * * * root /usr/local/bin/backup.sh > /proc/1/fd/1 2>/proc/1/fd/2' > /etc/crontab && crond -f"
    depends_on:
      - postgres
    networks:
      - db-net

networks:
  db-net:
    driver: bridge
    name: smartmove-db-net

volumes:
  postgres_data:
    driver: local
  backup_data:
    driver: local
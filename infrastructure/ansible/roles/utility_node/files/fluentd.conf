# Receive logs from Docker containers via the Forward protocol
<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

# Process and format the logs
<filter **>
  @type record_transformer
  <record>
    hostname "#{Socket.gethostname}"
    tag ${tag}
  </record>
</filter>

# Push the logs securely to Loki (Server 3) over Tailscale
<match **>
  @type loki
  # This points to Server 3's Command Center
  url "http://100.100.100.13:3100"
  
  <label>
    container_name $.kubernetes.container_name
    namespace $.kubernetes.namespace_name
    host $.hostname
  </label>
  
  <buffer>
    @type memory
    flush_interval 5s
    chunk_limit_size 2m
    retry_max_interval 30s
  </buffer>
</match>
---
- name: Install dependencies for Docker
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present

- name: Add Docker GPG apt Key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker Repository
  apt_repository:
    repo: deb https://download.docker.com/linux/ubuntu focal stable
    state: present

- name: Install Docker CE
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Ensure Docker service is running and enabled on boot
  service:
    name: docker
    state: started
    enabled: yes

- name: Add ubuntu user to docker group
  user:
    name: ubuntu
    groups: docker
    append: yes
- name: Create Fluentd configuration directory
  file:
    path: /opt/fluentd
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: Copy fluentd.conf to the Log Forwarder
  copy:
    src: fluentd.conf
    dest: /opt/fluentd/fluentd.conf
    owner: ubuntu
    group: ubuntu
    mode: "0644"

# ==============================================================================
# Loki — Log Aggregation Configuration for SmartMove SOC
# ==============================================================================

auth_enabled: false

server:
  http_listen_port: 3100
  log_level: info

# ── Common Storage Config ─────────────────────────────────────
common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# ── Schema ────────────────────────────────────────────────────
schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# ── Limits ────────────────────────────────────────────────────
limits_config:
  retention_period: 744h # 31 days
  max_query_series: 5000
  max_query_parallelism: 4
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20

# ── Compactor ─────────────────────────────────────────────────
compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h

# ── Query Frontend & Offloaded Caching (VM 6) ─────────────────
query_range:
  align_queries_with_step: true
  cache_results: true
  results_cache:
    cache:
      # THIS IS THE CRITICAL CHANGE:
      # Removed embedded_cache and offloaded it to VM 6
      redis:
        endpoint: "100.111.232.64:6379"
        timeout: 500ms

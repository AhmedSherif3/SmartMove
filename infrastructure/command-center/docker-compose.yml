# ==============================================================================
# SmartMove — Security & Observability Command Center (SOC)
# Docker Compose — Isolated Server Configuration
#
# Services: Grafana, Mimir, Loki, Tempo, Alertmanager, Marquez, 
#           Wazuh, ClamAV, Prometheus, Uptime Kuma, Status Page
# ==============================================================================

x-common-env: &common-env
  # ── Object Storage (S3-compatible / Oracle Object Storage) ──
  S3_ENDPOINT:        ${S3_ENDPOINT:-http://minio:9000}
  S3_ACCESS_KEY:      ${S3_ACCESS_KEY:-<YOUR_ACCESS_KEY>}
  S3_SECRET_KEY:      ${S3_SECRET_KEY:-<YOUR_SECRET_KEY>}
  S3_BUCKET_NAME:     ${S3_BUCKET_NAME:-smartmove-observability}
  S3_REGION:          ${S3_REGION:-us-east-1}

services:
  # ────────────────────────────────────────────────────────────
  # Grafana 11 — Unified dashboards & alerting UI
  # ────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana-oss:11.1.0
    container_name: soc-grafana
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-smartmove-soc-2026}
      GF_SERVER_ROOT_URL:         ${GF_ROOT_URL:-http://localhost:3100}
      GF_FEATURE_TOGGLES_ENABLE:  tempoSearch,tempoBackendSearch,tempoServiceGraph
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - mimir
      - loki
      - tempo
    networks:
      - soc-net

  # ────────────────────────────────────────────────────────────
  # Mimir — Long-term Prometheus-compatible metrics storage
  # ────────────────────────────────────────────────────────────
  mimir:
    image: grafana/mimir:2.13.0
    container_name: soc-mimir
    restart: unless-stopped
    command:
      - -config.file=/etc/mimir/mimir.yaml
      - -target=all
    ports:
      - "9009:9009"
    environment:
      <<: *common-env
    volumes:
      - ./mimir/mimir.yaml:/etc/mimir/mimir.yaml:ro
      - mimir_data:/data
    networks:
      - soc-net

  # ────────────────────────────────────────────────────────────
  # Loki — Log aggregation engine
  # ────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.1.0
    container_name: soc-loki
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/loki.yaml
    ports:
      - "3101:3100"
    environment:
      <<: *common-env
    volumes:
      - ./loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki_data:/loki
    networks:
      - soc-net

  # ────────────────────────────────────────────────────────────
  # Tempo — Distributed tracing backend
  # ────────────────────────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.5.0
    container_name: soc-tempo
    restart: unless-stopped
    command:
      - -config.file=/etc/tempo/tempo.yaml
    ports:
      - "3200:3200"       # Tempo HTTP API
      - "4317:4317"       # OTLP gRPC receiver
      - "4318:4318"       # OTLP HTTP receiver
    environment:
      <<: *common-env
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    networks:
      - soc-net

  # ────────────────────────────────────────────────────────────
  # Prometheus — Scrapes metrics & ships them to Mimir
  # ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      - soc-net
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────
  # Cloudflare Exporter — Pulls WAF/DDoS data into Prometheus
  # ────────────────────────────────────────────────────────────
  cloudflare-exporter:
    image: lablabs/cloudflare-exporter:latest
    container_name: cloudflare_exporter
    environment:
      - CF_API_EMAIL=${CF_API_EMAIL}
      - CF_API_KEY=${CF_API_KEY}
    ports:
      - "8080:8080"
    networks:
      - soc-net
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────
  # ClamAV — Antivirus REST API for Airflow Upload Scans
  # ────────────────────────────────────────────────────────────
  clamav-rest:
    image: lokori/clamav-rest:latest
    container_name: clamav_api
    ports:
      - "9000:9000"
    volumes:
      - ./clamav/clamd.conf:/etc/clamav/clamd.conf:ro
      - ./clamav/freshclam.conf:/etc/clamav/freshclam.conf:ro
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
        reservations:
          cpus: "0.5"
          memory: 512M
    networks:
      - soc-net
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────
  # Wazuh Manager — SIEM for intrusion detection and FIM
  # ────────────────────────────────────────────────────────────
  wazuh.manager:
    image: wazuh/wazuh-manager:4.7.2
    container_name: wazuh_manager
    ports:
      - "1514:1514" # Agent connection port
      - "1515:1515" # Agent enrollment port
      - "514:514/udp" # Syslog
      - "55000:55000" # Wazuh API
    volumes:
      - wazuh_manager_data:/var/ossec/data
      - ./wazuh/ossec.conf:/var/ossec/etc/ossec.conf:ro
      - ./wazuh/local_rules.xml:/var/ossec/etc/rules/local_rules.xml:ro
    networks:
      - soc-net
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────
  # Alertmanager — Alert routing, dedup & notification dispatch
  # ────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: soc-alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --web.external-url=http://localhost:9093
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - soc-net

  # ────────────────────────────────────────────────────────────
  # Marquez DB — Dedicated PostgreSQL for data lineage metadata
  # ────────────────────────────────────────────────────────────
  marquez-db:
    image: postgres:16-alpine
    container_name: soc-marquez-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       marquez
      POSTGRES_USER:     marquez
      POSTGRES_PASSWORD: ${MARQUEZ_DB_PASSWORD:-marquez}
    volumes:
      - marquez_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marquez -d marquez"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - soc-net

  # ────────────────────────────────────────────────────────────
  # Marquez API — OpenLineage-compatible data lineage backend
  # ────────────────────────────────────────────────────────────
  marquez-api:
    image: marquezproject/marquez:latest
    container_name: soc-marquez-api
    restart: unless-stopped
    ports:
      - "5000:5000"       # Marquez HTTP API
      - "5001:5001"       # Marquez Admin/Internal
    environment:
      MARQUEZ_PORT:      5000
      MARQUEZ_ADMIN_PORT: 5001
      POSTGRES_HOST:     marquez-db
      POSTGRES_PORT:     5432
      POSTGRES_DB:       marquez
      POSTGRES_USER:     marquez
      POSTGRES_PASSWORD: ${MARQUEZ_DB_PASSWORD:-marquez}
    depends_on:
      marquez-db:
        condition: service_healthy
    networks:
      - soc-net

  # ────────────────────────────────────────────────────────────
  # Marquez Web — Data lineage visualization UI
  # ────────────────────────────────────────────────────────────
  marquez-web:
    image: marquezproject/marquez-web:latest
    container_name: soc-marquez-web
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      MARQUEZ_HOST:      marquez-api
      MARQUEZ_PORT:      5000
    depends_on:
      - marquez-api
    networks:
      - soc-net

  # ────────────────────────────────────────────────────────────
  # Uptime Kuma — Internal Ping & Watchdog Service
  # ────────────────────────────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: soc-uptime-kuma
    ports:
      - "3001:3001"
    volumes:
      - ./uptime-kuma:/app/data
    networks:
      - soc-net
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────
  # Status Page — Public HTML Dashboard (status.smartmove.me)
  # ────────────────────────────────────────────────────────────
  status-page:
    image: nginx:alpine
    container_name: soc-status-page
    ports:
      - "8081:80"
    volumes:
      - ./status-page:/usr/share/nginx/html:ro
    networks:
      - soc-net
    restart: unless-stopped

# ──────────────────────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────────────────────
networks:
  soc-net:
    driver: bridge
    name: smartmove-soc

# ──────────────────────────────────────────────────────────────
# Named Volumes
# ──────────────────────────────────────────────────────────────
volumes:
  grafana_data:
    driver: local
  mimir_data:
    driver: local
  loki_data:
    driver: local
  tempo_data:
    driver: local
  alertmanager_data:
    driver: local
  marquez_db_data:
    driver: local
  prometheus_data:
    driver: local
  wazuh_manager_data:
    driver: local
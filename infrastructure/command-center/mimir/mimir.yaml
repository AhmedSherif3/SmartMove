# ==============================================================================
# Mimir — Monolithic Mode Configuration
# Long-term Prometheus-compatible metrics storage for SmartMove SOC.
# ==============================================================================

multitenancy_enabled: false

server:
  http_listen_port: 9009
  log_level: info

# ── Ingester ──────────────────────────────────────────────────
ingester:
  ring:
    replication_factor: 1
    kvstore:
      store: memberlist

# ── Distributor ───────────────────────────────────────────────
distributor:
  ring:
    kvstore:
      store: memberlist

# ── Compactor ─────────────────────────────────────────────────
compactor:
  data_dir: /data/compactor
  sharding_ring:
    kvstore:
      store: memberlist

# ── Store Gateway ─────────────────────────────────────────────
store_gateway:
  sharding_ring:
    replication_factor: 1
    kvstore:
      store: memberlist

# ── Block Storage & Offloaded Caching (VM 5) ──────────────────
blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/blocks
  tsdb:
    dir: /data/tsdb
  bucket_store:
    sync_dir: /data/bucket-sync
    # Offload metric

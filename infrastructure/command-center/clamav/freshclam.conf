# ==============================================================================
# SmartMove SOC — ClamAV Auto-Updater Configuration
# ==============================================================================

DatabaseOwner clamav
UpdateLogFile /var/log/clamav/freshclam.log
LogTime yes
LogVerbose no

# The official ClamAV signature mirrors
DatabaseMirror database.clamav.net

# Check for new virus signatures 24 times a day (Hourly)
Checks 24

# Security: Verify the digital signature of the downloaded database
VerifyDatabase yes

# Automatically notify the daemon to load the new database in the background
NotifyClamd /etc/clamav/clamd.conf
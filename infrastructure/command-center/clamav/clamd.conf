# ==============================================================================
# SmartMove SOC — Enterprise ClamAV Daemon Configuration
# ==============================================================================

# ── Logging & Setup ──────────────────────────────────────────
LogTime yes
LogClean no
LogVerbose no
PidFile /var/run/clamav/clamd.pid
LocalSocket /var/run/clamav/clamd.sock

# ── Network & API ────────────────────────────────────────────
TCPSocket 3310
TCPAddr 0.0.0.1
# Increased to 5 minutes to prevent timeouts on massive 1GB datasets
ReadTimeout 300 

# ── Performance & Limits ─────────────────────────────────────
# Limit threads so it doesn't hijack Server 3's entire CPU
MaxThreads 4

# Scaled up to handle SmartMove's 1GB Analytics Pro Engine uploads safely
MaxFileSize 1500M
MaxScanSize 2000M
StreamMaxLength 1500M

# Maximum directory depth for extracted archives (e.g., zipped data dumps)
MaxDirectoryRecursion 15
MaxFiles 50000

# ── Enterprise Security & Heuristics ─────────────────────────
# Do not block scans while the database is updating in the background
ConcurrentDatabaseReload yes

# Detect broken executables, phishing signatures, and malicious macros
HeuristicScanPrecedence yes
AlertBrokenExecutables yes
AlertEncrypted yes
AlertEncryptedArchive yes
PhishingSignatures yes
PhishingScanURLs yes
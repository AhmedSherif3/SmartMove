apiVersion: batch/v1
kind: Job
metadata:
  name: django-migrate
  namespace: smartmove-prod
spec:
  backoffLimit: 1
  template:
    spec:
      containers:
        - name: migrate
          image: smartmoveacr.azurecr.io/smartmove-backend:latest
          command: ["python", "manage.py", "migrate"]
          envFrom:
            - configMapRef:
                name: smartmove-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: smartmove-secrets
                  key: SECRET_KEY
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: smartmove-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartmove-secrets
                  key: DB_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartmove-secrets
                  key: REDIS_PASSWORD
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 2Gi
      restartPolicy: Never

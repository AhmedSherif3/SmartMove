# ==============================================================================
# SmartMove — Airflow (Dubai Region)
# ==============================================================================

# ── Scheduler Deployment ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler-dubai
  namespace: smartmove-admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-scheduler-dubai
  template:
    metadata:
      labels:
        app: airflow-scheduler-dubai
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: scheduler
          image: smartmoveacr.azurecr.io/airflow-dubai:latest
          command: ["airflow", "scheduler"]
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: airflow-secrets-dubai
                  key: AIRFLOW_DB_CONN
            - name: AIRFLOW__CORE__EXECUTOR
              value: "LocalExecutor"
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "False"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: tier
                    operator: NotIn
                    values:
                      - overflow

---
# ── Webserver Deployment ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver-dubai
  namespace: smartmove-admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-webserver-dubai
  template:
    metadata:
      labels:
        app: airflow-webserver-dubai
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: webserver
          image: smartmoveacr.azurecr.io/airflow-dubai:latest
          command: ["airflow", "webserver"]
          ports:
            - containerPort: 8082
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: airflow-secrets-dubai
                  key: AIRFLOW_DB_CONN
            - name: AIRFLOW__CORE__EXECUTOR
              value: "LocalExecutor"
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "False"
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: 500m
              memory: 2Gi
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: tier
                    operator: NotIn
                    values:
                      - overflow

---
# ── Service ──
apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver-dubai-service
  namespace: smartmove-admin
spec:
  type: ClusterIP
  selector:
    app: airflow-webserver-dubai
  ports:
    - port: 8082
      targetPort: 8082
      protocol: TCP

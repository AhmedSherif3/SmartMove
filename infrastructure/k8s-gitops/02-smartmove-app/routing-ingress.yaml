# ==============================================================================
# SmartMove — Application Ingress Routing
# Routes external traffic to frontend and backend services
# ==============================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smartmove-app-ingress
  namespace: smartmove-prod
  labels:
    app.kubernetes.io/part-of: smartmove
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/use-regex: "true"
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  # tls:
  #   - hosts:
  #       - smartmoveanalytics.me
  #       - api.smartmoveanalytics.me
  #     secretName: smartmove-tls
  rules:
    # --- Frontend: smartmoveanalytics.me ---
    - host: smartmoveanalytics.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3000

    # --- Backend API: api.smartmoveanalytics.me ---
    - host: api.smartmoveanalytics.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
# ==============================================================================
# SmartMove — Next.js Frontend Deployment & Service
# ==============================================================================

# ── Deployment ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: smartmove-prod
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: smartmove
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        app.kubernetes.io/name: frontend
    spec:
      containers:
        - name: frontend
          image: smartmoveacr.azurecr.io/smartmove-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: smartmove-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5

      # ── The 60% Spillover Logic (Node Affinity) ──
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: tier
                    operator: NotIn
                    values:
                      - overflow

---
# ── Service ──
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: smartmove-prod
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: smartmove
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP

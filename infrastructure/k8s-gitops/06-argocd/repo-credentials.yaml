# ==============================================================================
# SmartMove — ArgoCD Repository Credentials
# Gives ArgoCD permission to read the private GitHub Organization repository
# ==============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: smartmove-github-auth
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  # 1. The exact URL of your organization's repo
  url: "https://github.com/SmartMove-Organization/SmartMove.git"

  # 2. Your GitHub Username (or a dedicated "Machine User" for your team)
  username: "AhmedSherif3"

  # 3. A GitHub Personal Access Token (PAT)
  # IMPORTANT: If your organization uses SSO (Single Sign-On), you must click
  # "Authorize SSO" next to the token in GitHub settings, or it won't work!
  password: <GITHUB_TOKEN_HERE>

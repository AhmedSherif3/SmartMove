name: Backend CI

on:
    push:
    pull_request:
    workflow_dispatch:

jobs:
    test:
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_DB: smartmove_test
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install dependencies
              run: |
                  cd backend
                  pip install -r requirements/development.txt

            - name: Run Django checks
              env:
                  DJANGO_SETTINGS_MODULE: config.settings.testing
                  SECRET_KEY: test-secret-key-for-ci
                  DB_NAME: smartmove_test
                  DB_USER: postgres
                  DB_PASSWORD: postgres
                  DB_HOST: localhost
                  DB_PORT: 5432
                  REDIS_URL: redis://localhost:6379
              run: |
                  cd backend
                  python manage.py check

    # --------------------------------------------------------
    # Docker Build & Push to Azure Container Registry
    # Runs only on push to development or main (not on PRs)
    # --------------------------------------------------------
    docker:
        runs-on: ubuntu-latest
        needs: test
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/development' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main')

        steps:
            - uses: actions/checkout@v4

            - name: Log in to Azure Container Registry
              uses: azure/docker-login@v2
              with:
                  login-server: "smartmoveacr.azurecr.io"
                  username: ${{ secrets.ACR_USERNAME }}
                  password: ${{ secrets.ACR_PASSWORD }}

            - name: Build and push Docker image
              run: |
                  # Tag with both 'latest' and the git SHA for traceability
                  docker build \
                    -t smartmoveacr.azurecr.io/smartmove-backend:latest \
                    -t smartmoveacr.azurecr.io/smartmove-backend:${{ github.sha }} \
                    -f backend/Dockerfile \
                    backend/

                  docker push smartmoveacr.azurecr.io/smartmove-backend:latest
                  docker push smartmoveacr.azurecr.io/smartmove-backend:${{ github.sha }}
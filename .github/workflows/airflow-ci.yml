name: Airflow CI

on:
    push:
    pull_request:
    workflow_dispatch:

jobs:
    docker:
        runs-on: ubuntu-latest
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/development' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main')

        steps:
            - uses: actions/checkout@v4

            - name: Log in to Azure Container Registry
              uses: azure/docker-login@v2
              with:
                  login-server: "smartmoveacr.azurecr.io"
                  username: ${{ secrets.ACR_USERNAME }}
                  password: ${{ secrets.ACR_PASSWORD }}

            - name: Build and push Airflow England
              run: |
                  docker build \
                    -t smartmoveacr.azurecr.io/airflow-england:latest \
                    -t smartmoveacr.azurecr.io/airflow-england:${{ github.sha }} \
                    -f pipeline/Airflow/England/Dockerfile \
                    pipeline/Airflow/England/
                  
                  docker push smartmoveacr.azurecr.io/airflow-england:latest
                  docker push smartmoveacr.azurecr.io/airflow-england:${{ github.sha }}

            - name: Build and push Airflow Egypt
              run: |
                  docker build \
                    -t smartmoveacr.azurecr.io/airflow-egypt:latest \
                    -t smartmoveacr.azurecr.io/airflow-egypt:${{ github.sha }} \
                    -f pipeline/Airflow/Egypt/Dockerfile \
                    pipeline/Airflow/Egypt/
                  
                  docker push smartmoveacr.azurecr.io/airflow-egypt:latest
                  docker push smartmoveacr.azurecr.io/airflow-egypt:${{ github.sha }}

            - name: Build and push Airflow Dubai
              run: |
                  docker build \
                    -t smartmoveacr.azurecr.io/airflow-dubai:latest \
                    -t smartmoveacr.azurecr.io/airflow-dubai:${{ github.sha }} \
                    -f pipeline/Airflow/Dubai/Dockerfile \
                    pipeline/Airflow/Dubai/
                  
                  docker push smartmoveacr.azurecr.io/airflow-dubai:latest
                  docker push smartmoveacr.azurecr.io/airflow-dubai:${{ github.sha }}
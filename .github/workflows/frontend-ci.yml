name: Frontend CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint
        run: |
          cd frontend
          npm run lint

      - name: Build
        run: |
          cd frontend
          npm run build

  # --------------------------------------------------------
  # Docker Build & Push to Azure Container Registry
  # Runs only on push to development or main (not on PRs)
  # --------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: test
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/development' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: smartmoveacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          # Tag with both 'latest' and the git SHA for traceability
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL=https://api.smartmoveanalytics.me/api \
            -t smartmoveacr.azurecr.io/smartmove-frontend:latest \
            -t smartmoveacr.azurecr.io/smartmove-frontend:${{ github.sha }} \
            -f frontend/Dockerfile \
            frontend/

          docker push smartmoveacr.azurecr.io/smartmove-frontend:latest
          docker push smartmoveacr.azurecr.io/smartmove-frontend:${{ github.sha }}
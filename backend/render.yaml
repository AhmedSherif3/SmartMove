services:
  - type: web
    name: smartmove-backend
    runtime: python
    buildCommand: "pip install -r requirements/render.txt && python manage.py collectstatic --noinput"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.render
      - key: PYTHON_VERSION
        value: "3.12.0"
